<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Java Thread Visualizer</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/sockjs-client@1.6.1/dist/sockjs.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/stompjs@2.3.3/lib/stomp.min.js"></script>
</head>
<body>

<div id="top-bar">
    <div id="title-area">
        <span id="logo">&#11041;</span>
        <span id="app-title">Java Thread Visualizer</span>
    </div>
    <div id="status-bar">
        <div id="status-dot"></div>
        <span id="status-text">Connecting...</span>
        <button id="reconnect-btn" onclick="reconnect()">Reconnect JVM</button>
    </div>
    <button onclick="suspendJVM()"
            style="font-size:11px;padding:4px 10px;background:transparent;
                   color:#EF9F27;border:1px solid #EF9F27;border-radius:4px;
                   cursor:pointer;white-space:nowrap">
        ⏸ Pause JVM
    </button>
    <button onclick="resumeJVM()"
            style="font-size:11px;padding:4px 10px;background:transparent;
                   color:#1D9E75;border:1px solid #1D9E75;border-radius:4px;
                   cursor:pointer;white-space:nowrap">
        ▶ Resume JVM
    </button>
    <button onclick="stepJVM()"
            style="font-size:11px;padding:4px 10px;background:transparent;
               color:#8B5CF6;border:1px solid #8B5CF6;border-radius:4px;
               cursor:pointer;white-space:nowrap">
        ⏭ Step
    </button>
    <div id="stats-bar">
        <span class="stat"><span id="total-count">0</span> threads</span>
        <span class="stat run-stat"><span id="run-count">0</span> running</span>
        <span class="stat block-stat"><span id="block-count">0</span> blocked</span>
        <span class="stat wait-stat"><span id="wait-count">0</span> waiting</span>
    </div>
</div>

<div id="main-layout">

    <div id="canvas-area">
        <div id="canvas-label">JVM Process</div>
        <div id="process-circle">
            <div id="process-label">JVM<br>Process</div>
            <div id="thread-nodes"></div>
        </div>
        <div id="legend">
            <span class="legend-item"><span class="ldot RUNNABLE"></span>Runnable</span>
            <span class="legend-item"><span class="ldot BLOCKED"></span>Blocked</span>
            <span class="legend-item"><span class="ldot TIMED_WAITING"></span>Timed waiting</span>
            <span class="legend-item"><span class="ldot WAITING"></span>Waiting</span>
            <span class="legend-item"><span class="ldot TERMINATED"></span>Terminated</span>
        </div>
    </div>

    <div id="sidebar">
        <div id="detail-card">
            <div id="detail-header">Click a thread node to inspect</div>
            <div id="detail-body"></div>
        </div>
        <div id="thread-panel">
            <div class="panel-title">All Threads</div>
            <div id="thread-list"></div>
        </div>
        <div id="history-panel">
            <div class="panel-title">
                Execution History
                <button onclick="clearHistory()"
                        style="float:right;font-size:10px;padding:2px 8px;cursor:pointer">
                    Clear
                </button>
            </div>
            <div id="history-list"></div>
        </div>
    </div>

</div>

<script>

    // ── Fallback: poll REST API every second if WebSocket fails ───
    function pollREST() {
        setInterval(() => {
            fetch('/api/threads')
                .then(r => r.json())
                .then(threads => renderAll(threads))
                .catch(e => console.error('Poll error:', e));
        }, 1000);
        document.getElementById('status-dot').className = 'connected';
        document.getElementById('status-text').textContent = 'Connected (polling)';
    }

    // ── WebSocket connection ───────────────────────────────────────
    function connect() {
        try {
            const socket = new SockJS('/ws');
            const stomp = Stomp.over(socket);
            stomp.debug = null;

            stomp.connect({}, () => {
                setStatus(true);
                stomp.subscribe('/topic/threads', msg => {
                    renderAll(JSON.parse(msg.body));
                });
            }, err => {
                console.warn('STOMP failed, falling back to REST polling');
                pollREST();
            });
        } catch(e) {
            console.warn('WebSocket unavailable, using REST polling');
            pollREST();
        }
    }

    function reconnect() {
        fetch('/api/connect', { method: 'POST' })
            .then(r => r.json())
            .then(d => { alert(d.message); connect(); });
    }

    function setStatus(ok) {
        document.getElementById('status-dot').className = ok ? 'connected' : 'disconnected';
        document.getElementById('status-text').textContent = ok ? 'Connected to JVM' : 'Disconnected';
    }

    // ── State ─────────────────────────────────────────────────────
    let selectedThreadId = null;
    let historyLog = [];
    let previousStates = {};
    let previousLines = {};

    // ── Main render — called every second ─────────────────────────
    function renderAll(threads) {
        updateStats(threads);
        renderProcessCircle(threads);
        renderThreadList(threads);
        detectStateChanges(threads);
        if (selectedThreadId !== null) {
            const sel = threads.find(t => t.id === selectedThreadId);
            if (sel) renderDetailCard(sel);
        }
    }

    // ── Stats bar ─────────────────────────────────────────────────
    function updateStats(threads) {
        document.getElementById('total-count').textContent = threads.length;
        document.getElementById('run-count').textContent =
            threads.filter(t => t.state === 'RUNNABLE').length;
        document.getElementById('block-count').textContent =
            threads.filter(t => t.state === 'BLOCKED').length;
        document.getElementById('wait-count').textContent =
            threads.filter(t => t.state === 'WAITING' || t.state === 'TIMED_WAITING').length;
    }

    // ── Process circle ────────────────────────────────────────────
    function renderProcessCircle(threads) {
    const container = document.getElementById('thread-nodes');
    container.innerHTML = '';
    if (!threads.length) return;

    // Read actual rendered size — no more hardcoding!
    const circle = document.getElementById('process-circle');
    const circleSize = circle.offsetWidth;   // actual rendered px
    const center = circleSize / 2;
    const nodeSize = 52;
    const nodeRadius = nodeSize / 2;
    const orbitRadius = center - nodeRadius - 20;

    threads.forEach((thread, index) => {
        const angle = (2 * Math.PI * index / threads.length) - (Math.PI / 2);
        const x = center + orbitRadius * Math.cos(angle) - nodeRadius;
        const y = center + orbitRadius * Math.sin(angle) - nodeRadius;

        const node = document.createElement('div');
        node.className = 'thread-node ' + thread.state;
        node.id = 'node-' + thread.id;
        if (thread.id === selectedThreadId) node.classList.add('selected');
        node.style.left = x + 'px';
        node.style.top  = y + 'px';
        node.textContent = thread.name.length > 7
            ? thread.name.substring(0, 6) + '..'
            : thread.name;
        node.title = thread.name + '\nState: ' + thread.state + '\nMethod: ' + thread.currentMethod;

        node.addEventListener('click', () => {
            selectedThreadId = thread.id;
            renderDetailCard(thread);
            document.querySelectorAll('.thread-node').forEach(n => n.classList.remove('selected'));
            document.querySelectorAll('.thread-row').forEach(r => r.classList.remove('selected'));
            node.classList.add('selected');
            const row = document.getElementById('row-' + thread.id);
            if (row) row.classList.add('selected');
        });

        container.appendChild(node);
    });
}

    // ── Sidebar thread list ───────────────────────────────────────
    function renderThreadList(threads) {
        const list = document.getElementById('thread-list');
        list.innerHTML = '';

        threads.forEach(thread => {
            const row = document.createElement('div');
            row.className = 'thread-row' + (thread.id === selectedThreadId ? ' selected' : '');
            row.id = 'row-' + thread.id;
            row.innerHTML = `
                <span class="badge ${thread.state}">${thread.state.replace('_', ' ')}</span>
                <span class="tname">${thread.name}</span>
                <span class="tmethod">${thread.currentMethod}</span>`;

            row.addEventListener('click', () => {
                selectedThreadId = thread.id;
                renderDetailCard(thread);
                document.querySelectorAll('.thread-row').forEach(r => r.classList.remove('selected'));
                document.querySelectorAll('.thread-node').forEach(n => n.classList.remove('selected'));
                row.classList.add('selected');
                const node = document.getElementById('node-' + thread.id);
                if (node) node.classList.add('selected');
            });

            list.appendChild(row);
        });
    }

    // ── Detail card ───────────────────────────────────────────────
    function renderDetailCard(t) {
        document.getElementById('detail-header').textContent = 'Thread details';
        document.getElementById('detail-body').innerHTML = `
            <div class="detail-name">
                ${t.name}
                <span class="badge ${t.state}" style="margin-left:6px">${t.state.replace('_', ' ')}</span>
            </div>
            <div class="detail-row">
                <span class="label">Thread ID</span>
                <span class="value">${t.id}</span>
            </div>
            <div class="detail-row">
                <span class="label">Group</span>
                <span class="value">${t.threadGroup}</span>
            </div>
            <div class="detail-row">
                <span class="label">Method</span>
                <span class="value" title="${t.currentMethod}">${t.currentMethod}</span>
            </div>
            <div class="detail-row">
                <span class="label">Source file</span>
                <span class="value">${t.sourceFile}</span>
            </div>
            <div class="detail-row">
                <span class="label">Line number</span>
                <span class="value">${t.lineNumber > 0 ? t.lineNumber : '-'}</span>
            </div>`;
    }

function detectStateChanges(threads) {
    const now = new Date().toLocaleTimeString();
    threads.forEach(t => {
        const isNew = previousStates[t.id] === undefined;
        const stateChanged = !isNew && previousStates[t.id] !== t.state;
        const lineChanged = previousLines[t.id] !== undefined
                            && previousLines[t.id] !== t.lineNumber
                            && t.lineNumber > 0;

        if (isNew || stateChanged || lineChanged) {
            historyLog.unshift({
                time:      now,
                name:      t.name,
                state:     t.state,
                method:    t.currentMethod,  // ← must have this
                file:      t.sourceFile,     // ← must have this
                line:      t.lineNumber,     // ← must have this
                variables: t.variables || [] // ← must have this
            });
        }

        previousStates[t.id] = t.state;
        previousLines[t.id]  = t.lineNumber;
        if (historyLog.length > 500) historyLog.pop(); // keep more history
    });
    renderHistory();
}

function renderHistory() {
    document.getElementById('history-list').innerHTML =
        historyLog.slice(0, 100).map(e => {
            // Build variables string
            const vars = e.variables && e.variables.length > 0
                ? e.variables.map(v =>
                    `<span class="h-var">
                        <span class="h-var-name">${v.name}</span>
                        <span class="h-var-eq">=</span>
                        <span class="h-var-val">${v.value}</span>
                        <span class="h-var-type">(${v.type})</span>
                    </span>`
                  ).join('')
                : '';

            const lineInfo = e.line > 0
                ? `<span class="h-line">line ${e.line}</span>`
                : '';

            return `
            <div class="history-entry">
                <div class="h-main-row">
                    <span class="h-time">${e.time}</span>
                    <span class="h-name">${e.name}</span>
                    <span class="h-arrow">→</span>
                    <span class="h-state ${e.state}">${e.state.replace('_', ' ')}</span>
                    ${lineInfo}
                </div>
                ${e.method && e.method !== 'unknown' ? `
                <div class="h-method-row">
                    <span class="h-method-label">at</span>
                    <span class="h-method">${e.method}</span>
                    ${e.file !== '-' ? `<span class="h-file">${e.file}</span>` : ''}
                </div>` : ''}
                ${vars ? `<div class="h-vars-row">${vars}</div>` : ''}
            </div>`;
        }).join('');
}

    function clearHistory() {
        historyLog = [];
        previousStates = {};
        renderHistory();
    }

    function stepJVM() {
    fetch('/api/step', { method: 'POST' })
        .then(r => r.json())
        .then(d => console.log('Stepped:', d));
}

    function suspendJVM() {
    fetch('/api/suspend', { method: 'POST' })
        .then(r => r.json())
        .then(d => {
            document.getElementById('status-text').textContent = '⏸ JVM Paused';
            document.getElementById('status-dot').style.background = '#EF9F27';
        });
}

function resumeJVM() {
    fetch('/api/resume', { method: 'POST' })
        .then(r => r.json())
        .then(d => {
            document.getElementById('status-text').textContent = 'Connected to JVM';
            document.getElementById('status-dot').style.background = '#1D9E75';

            // Immediately fetch threads right after resume
            // so we capture the execution state before program finishes
            fetch('/api/threads')
                .then(r => r.json())
                .then(threads => {
                    renderAll(threads);
                    // Force history log even if program finishes right after
                    const now = new Date().toLocaleTimeString();
                    threads.forEach(t => {
                        historyLog.unshift({
                            time: now,
                            name: t.name,
                            state: t.state,
                            method: t.currentMethod,
                            file: t.sourceFile,
                            line: t.lineNumber,
                            variables: t.variables || []
                        });
                        previousStates[t.id] = t.state;
                        previousLines[t.id] = t.lineNumber;
                    });
                    renderHistory();
                });
        });
}
    // ── Start ─────────────────────────────────────────────────────
    connect();

</script>
</body>
</html>
