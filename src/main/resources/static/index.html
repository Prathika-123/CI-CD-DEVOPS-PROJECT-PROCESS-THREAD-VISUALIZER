<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Thread Visualizer</title>

    <style>
        body {
            margin:0;
            display:flex;
            height:100vh;
            font-family: 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #1e1e2f, #2a2a40);
            color:white;
        }

        /* LEFT PANEL */
        #circle-container {
            width:600px;
            height:600px;
            margin:auto;
            position:relative;
            border-radius:50%;
            backdrop-filter: blur(15px);
            background: rgba(255,255,255,0.05);
            box-shadow: 0 0 40px rgba(0,0,0,0.5);
        }

        /* THREAD NODE */
        .thread-node {
            position:absolute;
            width:55px;
            height:55px;
            border-radius:50%;
            display:flex;
            justify-content:center;
            align-items:center;
            font-weight:bold;
            font-size:13px;
            cursor:pointer;
            transition: all 0.3s ease;
            box-shadow:0 0 15px rgba(0,0,0,0.5);
        }

        .thread-node:hover {
            transform: scale(1.2);
            box-shadow:0 0 25px rgba(255,255,255,0.6);
        }

        /* RIGHT PANEL */
        #sidebar {
            width:420px;
            background: rgba(0,0,0,0.4);
            backdrop-filter: blur(20px);
            padding:20px;
            overflow-y:auto;
            border-left:1px solid rgba(255,255,255,0.1);
        }

        /* HEADER */
        #sidebar h2 {
            margin-top:0;
            font-size:22px;
            letter-spacing:1px;
            border-bottom:2px solid #4CAF50;
            padding-bottom:8px;
        }

        /* THREAD CARD */
        .thread-info {
            background: rgba(255,255,255,0.05);
            border-radius:10px;
            padding:12px;
            margin-bottom:12px;
            transition:0.3s;
        }

        .thread-info:hover {
            background: rgba(255,255,255,0.1);
            transform: scale(1.02);
        }

        /* TEXT */
        .thread-info p {
            margin:4px 0;
            font-size:13px;
        }

        .timestamp {
            color:#bbb;
            font-size:12px;
            margin-top:6px;
            max-height:80px;
            overflow-y:auto;
        }

        /* SCROLLBAR */
        #sidebar::-webkit-scrollbar {
            width:6px;
        }
        #sidebar::-webkit-scrollbar-thumb {
            background:#555;
            border-radius:10px;
        }
    </style>
</head>

<body>

<div id="circle-container"></div>

<div id="sidebar">
    <h2>⚡ Thread Monitor</h2>
    <div id="details-container"></div>
</div>

<script>
    const circle = document.getElementById('circle-container');
    const detailsContainer = document.getElementById('details-container');

    function getColor(state){
        switch(state){
            case "RUNNABLE": return "linear-gradient(135deg,#00c853,#69f0ae)";
            case "BLOCKED": return "linear-gradient(135deg,#d50000,#ff5252)";
            case "WAITING":
            case "TIMED_WAITING": return "linear-gradient(135deg,#ffab00,#ffd740)";
            case "TERMINATED": return "linear-gradient(135deg,#616161,#9e9e9e)";
            default: return "linear-gradient(135deg,#2962ff,#82b1ff)";
        }
    }

    const ws = new WebSocket("ws://localhost:8080/ws/threads");

    ws.onmessage = function(event){
        const threads = JSON.parse(event.data);

        // DRAW CIRCLE
        circle.innerHTML = '';
        const radius = 250, centerX = 300, centerY = 300;

        threads.forEach((thread, index)=>{
            const angle = (2*Math.PI/threads.length)*index;
            const x = centerX + radius*Math.cos(angle) - 27;
            const y = centerY + radius*Math.sin(angle) - 27;

            const node = document.createElement('div');
            node.className = 'thread-node';
            node.style.left = `${x}px`;
            node.style.top = `${y}px`;
            node.style.background = getColor(thread.state);
            node.innerText = thread.id;

            circle.appendChild(node);
        });

        // SIDEBAR
        detailsContainer.innerHTML = '';

        threads.forEach(thread => {

            const threadDiv = document.createElement('div');
            threadDiv.className = 'thread-info';

            const historyHtml = thread.history
                .map(h => `${h.state} @ ${new Date(parseInt(h.time)).toLocaleTimeString()}`)
                .join("<br>");

            threadDiv.innerHTML = `
                <p><strong>ID:</strong> ${thread.id}</p>
                <p><strong>Name:</strong> ${thread.name}</p>
                <p><strong>State:</strong> ${thread.state}</p>
                <p><strong>Class:</strong> ${thread.class}</p>
                <p><strong>Method:</strong> ${thread.method}</p>
                <p><strong>Line:</strong> ${thread.line}</p>
                <div class="timestamp">
                    <strong>History:</strong><br>${historyHtml}
                </div>
            `;

            detailsContainer.appendChild(threadDiv);
        });
    };
</script>

</body>
</html>
